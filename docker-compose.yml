services:
  app:
    build: .
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./public_html:/var/www/html
    env_file:
      - /home/patrickgartside/secrets/access100.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - npm_default

  db:
    image: mysql:8.0
    ports:
      - "127.0.0.1:3307:3306"
    env_file:
      - /home/patrickgartside/secrets/access100.env
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:

networks:
  npm_default:
    external: true
